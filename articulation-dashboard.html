  .statrow .val .u{font-size:.6em;font-weight:600;color:var(--dim);margin-left:2px}

  /* ---- FILTER TABS (client-side range) ---- */
  .ftabs{display:inline-flex;gap:4px;padding:4px;background:var(--surf2);border:1px solid var(--line);border-radius:var(--r-pill);flex-wrap:wrap}
  .ftab{font-family:inherit;font-size:var(--fs-sm);font-weight:700;letter-spacing:.01em;cursor:pointer;

<script>
(function(){
  "use strict";
  const D = window.DASH || null;
  const app = document.getElementById('app');
  if(!D){ app.innerHTML = '<p style="color:#dc2626;font-family:\'Be Vietnam Pro\',system-ui,sans-serif">Không nạp được dashboard-data.js — chạy <code>cli dashboard</code> để build.</p>'; return; }

  // ---- COL dict (Bold modern · nền sáng): indigo=composite · violet=depth · teal=structure ----
  const COL = { green:'#15803d', amber:'#b45309', red:'#dc2626', orange:'#0d9488',
                accent:'#a855f7', accent2:'#6366f1', primary:'#4f46e5',
                mut:'#5b6472', dim:'#8089a0', line:'#e7e7ef', surf2:'#f7f7fb' };
  const charts = {};

  // ---- Chart.js factory (mirror fitness; an toàn — destroy trước khi vẽ lại) ----
  function chart(id, cfg){
    try{
      if(charts[id]) charts[id].destroy();
      const el = document.getElementById(id);
      if(el && window.Chart) charts[id] = new Chart(el, cfg);
    }catch(e){ console.warn(id, e); }
  }

  // ---- helpers ----
  const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const dash = v => (v==null || v==='') ? '—' : v;
  // Nhãn hiển thị tiếng Anh cho tier + verdict (Dũng: "để tiếng Anh hết") — giữ vrdClass cho màu
  const TIER_EN = {quen:'Familiar', can:'Near', la:'Novel'};
  const VRD_EN  = {TOT:'Good', ON:'OK', SIET:'Tighten', YEU:'Weak'};
  const tierLabel = t => TIER_EN[String(t||'').toLowerCase()] || dash(t);
  const vrdLabel  = v => VRD_EN[String(v||'').toUpperCase().trim()] || dash(v);
  const short = d => d ? String(d).slice(5) : '';           // 'MM-DD'
  const fmt1 = v => v==null ? '—' : (Math.round(v*10)/10).toFixed(1);
  // lucide-ish inline icon (đường tối giản, mirror style fitness .ico)
  const ICONS = {
    flame:"<path d='M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z'/>",
    grid:"<rect width='7' height='7' x='3' y='3' rx='1'/><rect width='7' height='7' x='14' y='3' rx='1'/><rect width='7' height='7' x='14' y='14' rx='1'/><rect width='7' height='7' x='3' y='14' rx='1'/>",
    list:"<path d='M8 6h13'/><path d='M8 12h13'/><path d='M8 18h13'/><path d='M3 6h.01'/><path d='M3 12h.01'/><path d='M3 18h.01'/>",
    radar:"<path d='M12 2 2 7l10 5 10-5-10-5Z'/><path d='m2 17 10 5 10-5'/><path d='m2 12 10 5 10-5'/>",
    trend:"<path d='M16 7h6v6'/><path d='m22 7-8.5 8.5-5-5L2 17'/>",
    bars:"<path d='M3 3v18h18'/><rect x='7' y='12' width='3' height='6' rx='.5'/><rect x='12' y='8' width='3' height='10' rx='.5'/><rect x='17' y='5' width='3' height='13' rx='.5'/>"
  };
  const ico = name => `<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;

  // verdict → class màu. Map theo BAND KEY engine (TOT/ON/SIET/YEU) — bền hơn regex mờ.
  // đỏ = cần chú ý: CẢ SIET (≥2) LẪN YEU (<2, tệ nhất) → vrd-tight (KHÔNG để YEU lọt thành vàng).
  function vrdClass(v){
    const s = String(v||'').toUpperCase().trim();
    if(s==='TOT' || s.includes('TỐT') || s.includes('GOOD')) return 'vrd-good';
    if(s==='ON' || s.includes('ỔN')) return 'vrd-ok';
    if(s==='SIET' || s==='YEU' || s.includes('SIẾT') || s.includes('YẾU')
       || s.includes('CẦN') || s.includes('TIGHT') || s.includes('WEAK')) return 'vrd-tight';
    return 'vrd-ok';
  }

  const meta = D.meta || {};
  const C    = D.cockpit || {};

  // tổng số buổi: ưu tiên stats.all_time.sessions; fallback Σ daily.sessions; cuối cùng cockpit.
  function totalSessions(){
    const at = (D.stats && D.stats.all_time) ? D.stats.all_time.sessions : null;
    if(at != null) return at;
    const dl = Array.isArray(D.daily) ? D.daily : [];
    if(dl.length) return dl.reduce((a,d)=>a+(d.sessions||0),0);
    return C.total_sessions ?? 0;
  }

  // ===================================================================
  // SECTION 1 — COCKPIT HERO (quote-signature HERO; adherence = SUB)
  //   Hero KHÔNG dẫn bằng clarity: câu cố định là hero, adherence là phụ.
  // ===================================================================
  function heroHTML(){
    const dsl   = C.days_since_last;          // int | null
    const wc    = C.week_count ?? 0;
    const wt    = C.week_target ?? meta.week_target ?? 4;
    const wdone = !!C.week_done;
    const streak= C.week_streak ?? 0;
    const total = totalSessions();

    // ── ADHERENCE giờ là SUB (giữ động lực + tô warn/cold theo dsl) ──
    // "buổi thứ N" = tổng số buổi đã tập (total).
    let adhLine, adhCls='', sub;
    if(dsl == null){
      adhLine = 'Chưa có buổi nào — bắt đầu hôm nay';
      sub = 'Mỗi buổi 2–3 phút. Mục tiêu nhịp đều: <b style="color:var(--accent)">'+wt+' buổi/tuần</b>.';
    }else if(dsl === 0){
      adhLine = 'Đã tập <span class="hot">hôm nay</span> ✓ · buổi thứ <span class="n">'+total+'</span>';
      sub = 'Buổi gần nhất: <b class="mono">'+esc(C.last_date||'')+'</b>. Mục tiêu '+wt+' buổi/tuần.';
    }else{
      adhCls = dsl >= 4 ? 'cold' : (dsl >= 2 ? 'warn' : '');
      adhLine = 'Đã <span class="n">'+dsl+'</span> ngày chưa tập';
      // taper-framing: KHÔNG bao giờ "mất chuỗi"
      const nudge = dsl >= 4 ? 'Lâu rồi — một buổi ngắn hôm nay là đủ kéo nhịp lại.'
                  : 'Một buổi 2–3 phút hôm nay giữ nhịp tuần.';
      sub = nudge + ' Buổi gần nhất: <b class="mono">'+esc(C.last_date||'')+'</b>.';
    }

    // ring X/4 — SVG (giống fitness rings, 1 vòng tiến độ tuần)
    const R=78, CIRC=2*Math.PI*R, frac=Math.max(0,Math.min(1, wt? wc/wt : 0));
    const ringCol = wdone ? COL.accent : (wc>0 ? COL.accent2 : COL.line);
    const ringSvg =
      `<div class="wkrings ${wdone?'wk-done':''}">
         <svg viewBox="0 0 180 180" role="img" aria-label="Tuần này ${wc} trên ${wt} buổi">
           <circle cx="90" cy="90" r="${R}" fill="none" stroke="${COL.surf2}" stroke-width="13"/>
           <circle cx="90" cy="90" r="${R}" fill="none" stroke="${ringCol}" stroke-width="13"
                   stroke-linecap="round" stroke-dasharray="${CIRC}"
                   stroke-dashoffset="${CIRC*(1-frac)}"/>
         </svg>
         <div class="wk-center">
           <b>${wc}<span class="of">/${wt}</span></b>
           <span>Tuần này</span>
         </div>
       </div>`;

    return `<section class="hero">
      <div class="hero-main">
        <div class="herotop">
          <span class="tag">Articulation · luyện nói</span>
          <span class="updated"><span class="dot"></span>As of <b>${esc(meta.as_of||'')}</b></span>
        </div>
        <h2 class="quote"><span class="qm">&ldquo;</span>You're only as good as you can say it.<span class="qm">&rdquo;</span></h2>
        <p class="adh ${adhCls}">${adhLine}</p>
        <p class="sub">${sub}</p>
        ${streak>0 ? `<span class="streakchip">⚡ ${streak} tuần đạt liên tiếp</span>` : ''}
        <div class="herometa">
          <div><b class="${wdone?'hl':''}">${wc}/${wt}</b><span>Buổi tuần này</span></div>
          <div><b class="hl">${streak}</b><span>Tuần đạt liên tiếp ≥${wt}</span></div>
          <div><b>${total}</b><span>Tổng buổi đã tập</span></div>
        </div>
      </div>
      <div class="hero-side">${ringSvg}</div>
    </section>`;
  }

  // ===================================================================
  // SECTION 1b — 📊 FILTER + CHARTS per-day (client-side, không reload)
  //   Nguồn: window.DASH.daily = chuỗi per-day liên tục (mọi ngày kể cả 0).
  //   FE tự Σ theo range chọn → hàng SỐ TỔNG + 2 chart kiểu Garmin
  //   (1 chart GỘP dual-axis Từ/WPM · 1 chart line Clarity). Đổi range =
  //   cập nhật số + destroy/redraw 2 chart. ⛔ CHỈ con số — KHÔNG transcript.
  // ===================================================================
  const RANGES = [
    {key:'today', label:'Hôm nay', days:1},
    {key:'week',  label:'Tuần này', days:7},
    {key:'m30',   label:'30 ngày', days:30},
    {key:'all',   label:'All-time', days:null},
  ];
  let activeRange = 'm30';   // mặc định 30 ngày (Garmin-style)
  const grp = v => String(v).replace(/\B(?=(\d{3})+(?!\d))/g, '.');  // 1.350 kiểu VN

  // Lát chuỗi daily theo range (đuôi N ngày tính tới as_of; all = toàn bộ).
  function sliceDaily(key){
    const dl = Array.isArray(D.daily) ? D.daily.slice() : [];
    if(!dl.length) return [];
    const r = RANGES.find(x=>x.key===key) || RANGES[2];
    if(r.days == null) return dl;            // all-time
    return dl.slice(-r.days);                // N ngày cuối
  }

  // Σ các metric trong range; wpm_avg = Σ wpm_wsum / Σ audio_words.
  function aggDaily(arr){
    const s = {sessions:0, words:0, minutes:0, probes:0, issues:0, audio_words:0, wpm_wsum:0};
    for(const d of arr){
      s.sessions += d.sessions||0; s.words += d.words||0; s.minutes += d.minutes||0;
      s.probes += d.probes||0; s.issues += d.issues||0;
      s.audio_words += d.audio_words||0; s.wpm_wsum += d.wpm_wsum||0;
    }
    s.wpm_avg = s.audio_words > 0 ? Math.round(s.wpm_wsum / s.audio_words) : null;
    return s;
  }

  function filterHTML(){
    const tabs = RANGES.map(r=>
      `<button type="button" class="ftab${r.key===activeRange?' active':''}" data-range="${r.key}">${r.label}</button>`
    ).join('');
    const hasDaily = Array.isArray(D.daily) && D.daily.length;
    const body = hasDaily ? `
      <div class="rstats" id="rstats"></div>
      <div class="rcharts">
        <div class="rchart">
          <div class="ct">Từ đã nói / ngày · WPM / ngày</div>
          <div class="chartbox" style="height:260px"><canvas id="cWords"></canvas></div>
        </div>
        <div class="rchart">
          <div class="ct">Clarity / ngày</div>
          <div class="chartbox" style="height:260px"><canvas id="cClarity"></canvas></div>
        </div>
      </div>` : `<div class="empty">Chưa có dữ liệu buổi nào — bắt đầu buổi đầu tiên hôm nay.</div>`;
    return `<div class="card">
      <div class="filterhead">
        <h3 style="margin:0">${ico('bars')} Thống kê theo khoảng</h3>
        <div class="ftabs" id="ftabs">${tabs}</div>
      </div>
      ${body}
      <div class="hint">Số tổng hợp client-side từ chuỗi per-day (⛔ KHÔNG transcript). Từ/ngày = bar (trục trái); WPM/ngày = line (trục phải, CHỈ ngày ghi âm); WPM trung bình range = Σ(wpm×từ audio)/Σ từ audio. Clarity = trung bình điểm buổi/ngày (ngày trống bỏ qua). Điểm cải thiện = Σ cờ + drill.</div>
    </div>`;
  }

  // hàng SỐ TỔNG (6 ô) theo range
  function renderRangeStats(){
    const el = document.getElementById('rstats'); if(!el) return;
    const a = aggDaily(sliceDaily(activeRange));
    const cells = [
      ['Buổi',        grp(a.sessions)],
      ['Từ đã nói',   grp(a.words)],
      ['Phút',        grp(a.minutes)+'<span class="u">ph</span>'],
      ['WPM',         a.wpm_avg==null?'—':grp(a.wpm_avg)],
      ['Câu hỏi',     grp(a.probes)],
      ['Điểm chỉ ra', grp(a.issues)],
    ];
    el.innerHTML = cells.map(([l,v])=>`<div class="rstat"><b>${v}</b><span>${l}</span></div>`).join('');
  }

  // 2 chart per-day theo range (destroy+redraw qua factory chart())
  function drawRangeCharts(){
    if(!(Array.isArray(D.daily) && D.daily.length)) return;
    const arr = sliceDaily(activeRange);
    const labels = arr.map(d=>short(d.date));
    const words  = arr.map(d=>d.words||0);
    // WPM/ngày: chỉ ngày có audio (audio_words>0) → Σwpm_wsum/Σaudio; ngày khác = null (gap)
    const wpmDay = arr.map(d=> (d.audio_words>0) ? Math.round((d.wpm_wsum||0)/d.audio_words) : null);
    const clar   = arr.map(d=> d.clarity==null ? null : d.clarity);
    const ptN = arr.length;   // 0–1 điểm vẫn vẽ an toàn

    // CHART GỘP dual-axis: bar Từ (trái) + line WPM (phải, spanGaps)
    chart('cWords', {
      type:'bar',
      data:{ labels, datasets:[
        { type:'bar', label:'Từ đã nói', data:words, yAxisID:'y',
          backgroundColor:'rgba(99,102,241,.55)', borderColor:COL.accent2,
          borderWidth:1, borderRadius:4, maxBarThickness:26, order:2 },
        { type:'line', label:'WPM', data:wpmDay, yAxisID:'y1', spanGaps:true,
          borderColor:COL.accent, backgroundColor:COL.accent,
          borderWidth:2, tension:.3, pointRadius:ptN<=31?3:0, order:1 },
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{ labels:{ color:COL.mut, usePointStyle:true, boxWidth:8, font:{size:11} } },
          tooltip:{ callbacks:{ label:c=> `${c.dataset.label}: ${c.raw==null?'—':c.raw}` } } },
        scales:{
          x:{ grid:{ display:false }, ticks:{ color:COL.dim, font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:12 } },
          y:{ position:'left', beginAtZero:true, grid:{ color:COL.line },
              ticks:{ color:COL.dim, font:{size:10} },
              title:{ display:true, text:'Từ', color:COL.dim, font:{size:10} } },
          y1:{ position:'right', beginAtZero:true, grid:{ display:false },
              ticks:{ color:COL.accent, font:{size:10} },
              title:{ display:true, text:'WPM', color:COL.accent, font:{size:10} } },
        }
      }
    });

    // CHART line Clarity/ngày (0–5, gap khi ngày trống)
    chart('cClarity', {
      type:'line',
      data:{ labels, datasets:[
        { label:'Clarity', data:clar, spanGaps:true,
          borderColor:COL.primary, backgroundColor:'rgba(79,70,229,.10)', fill:true,
          borderWidth:2, tension:.3, pointRadius:ptN<=31?3:0 },
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{ display:false },
          tooltip:{ callbacks:{ label:c=> `Clarity: ${c.raw==null?'—':(Math.round(c.raw*100)/100)}` } } },
        scales:{
          x:{ grid:{ display:false }, ticks:{ color:COL.dim, font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:12 } },
          y:{ min:0, max:5, grid:{ color:COL.line }, ticks:{ color:COL.dim, stepSize:1, font:{size:10} } }
        }
      }
    });
  }

  // wire tab clicks (client-side: đổi range → cập nhật số + 2 chart, KHÔNG reload)
  function wireFilter(){
    const tabs = document.getElementById('ftabs'); if(!tabs) return;
    tabs.addEventListener('click', e=>{
      const btn = e.target.closest('.ftab'); if(!btn) return;
      const key = btn.dataset.range; if(key===activeRange) return;
      activeRange = key;
      tabs.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('active', b.dataset.range===key));
      renderRangeStats();
      if(window.Chart) drawRangeCharts();
    });
  }

  // ===================================================================
  // SECTION 2 — HEATMAP / calendar ~30 ngày
  // ===================================================================
  function calHTML(){
    const cal = Array.isArray(D.calendar) ? D.calendar : [];
    const today = meta.as_of;
    let cells = '';
    if(!cal.length){
      cells = '<div class="empty" style="grid-column:1/-1">Chưa có dữ liệu lịch.</div>';
    }else{
      cells = cal.map(c=>{
        const cnt = c.count||0;
        const lvl = cnt>=2 ? 'p2' : (cnt>=1 ? 'p1' : '');
        const isToday = c.date===today ? ' today' : '';
        const dd = String(c.date||'').slice(8);   // 'DD'
        return `<div class="calcell ${lvl}${isToday}" title="${esc(c.date)} · ${cnt} buổi">${dd}</div>`;
      }).join('');
    }
    return `<div class="card">
      <h3>${ico('grid')} 30 ngày gần đây · nhịp tập</h3>
      <div class="calwrap">
        <div class="calgrid">${cells}</div>
        <div class="callegend">
          <span><i class="l0"></i>trống</span>
          <span><i class="l1"></i>1 buổi</span>
          <span><i class="l2"></i>≥2 buổi</span>
          <span style="margin-left:auto">ô viền xanh = hôm nay (as_of)</span>
        </div>
      </div>
      <div class="hint">Credit nhị phân: mọi rep trong 1 ngày = 1 buổi-trong-ngày. Khoảng trống = gap nhìn thấy được, KHÔNG phải "mất chuỗi".</div>
    </div>`;
  }

  // ===================================================================
  // SECTION 3 — DANH SÁCH buổi gần đây (⛔ KHÔNG cột transcript)
  // ===================================================================
  function sessHTML(){
    const ss = Array.isArray(D.sessions) ? D.sessions : [];
    let body;
    if(!ss.length){
      body = `<div class="empty">Chưa có buổi nào — bắt đầu buổi đầu tiên hôm nay.</div>`;
    }else{
      const rows = ss.map(s=>{
        return `<tr>
          <td class="d">${esc(s.date)}</td>
          <td class="topic">${esc(dash(s.topic))}</td>
          <td><span class="pill tier">${esc(tierLabel(s.tier))}</span></td>
          <td class="clr">${s.clarity==null?'—':fmt1(s.clarity)}</td>
          <td><span class="vrd ${vrdClass(s.verdict)}">${esc(vrdLabel(s.verdict))}</span></td>
          <td class="drill">${esc(dash(s.drill))}</td>
        </tr>`;
      }).join('');
      body = `<table class="sess">
        <thead><tr><th>Ngày</th><th>Chủ đề</th><th>Tier</th><th>Clarity</th><th>Verdict</th><th>Drill</th></tr></thead>
        <tbody>${rows}</tbody></table>`;
    }
    return `<div class="card">
      <h3>${ico('list')} Buổi gần đây</h3>
      ${body}
      <div class="hint">⛔ Privacy: bảng KHÔNG hiển thị transcript. clarity = Σ(điểm×trọng số) · band Good≥4 / OK≥3 / Tighten≥2.</div>
    </div>`;
  }

  // ===================================================================
  // SECTION 4 — RADAR 5 chiều (buổi mới nhất)
  // ===================================================================
  function radarHTML(){
    return `<div class="card">
      <h3>${ico('radar')} Radar 5 chiều ${D.radar && D.radar.date ? '· '+esc(D.radar.date) : ''}</h3>
      <div class="chartbox" style="height:300px"><canvas id="cRadar"></canvas></div>
      <div class="hint">5 chiều theo trọng số engine: Cấu trúc·Độ sâu (.30) · Chốt hạ (.20) · Cô đọng·Tín hiệu (.10). Buổi mới nhất.</div>
    </div>`;
  }
  function drawRadar(){
    const r = D.radar || {};
    const dims = Array.isArray(r.dims) && r.dims.length ? r.dims : ['Cấu trúc','Độ sâu','Chốt hạ','Cô đọng','Tín hiệu/nhiễu'];
    const sc   = Array.isArray(r.scores) ? r.scores : [null,null,null,null,null];
    const hasData = sc.some(v=>v!=null);
    chart('cRadar', {
      type:'radar',
      data:{ labels:dims, datasets:[{
        label: r.date || 'Buổi mới nhất',
        data: sc.map(v=>v==null?null:v),
        fill:true,
        backgroundColor:'rgba(99,102,241,.16)',
        borderColor:COL.primary, pointBackgroundColor:COL.primary,
        borderWidth:2, pointRadius:hasData?3:0
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ label:c=> `${c.label}: ${c.raw==null?'—':(Math.round(c.raw*10)/10)}` } } },
        scales:{ r:{
          min:0, max:5, ticks:{ stepSize:1, color:COL.dim, backdropColor:'transparent', font:{size:10} },
          grid:{ color:COL.line }, angleLines:{ color:COL.line },
          pointLabels:{ color:COL.mut, font:{size:11} }
        }}
      }
    });
  }

  // ===================================================================
  // SECTION 5 — TREND (clarity roll + Depth & Structure 2 ĐƯỜNG RIÊNG)
  // ===================================================================
  function trendHTML(){
    return `<div class="card">
      <h3>${ico('trend')} Xu hướng · rolling-mean</h3>
      <div class="chartbox" style="height:300px"><canvas id="cTrend"></canvas></div>
      <div class="hint">3 đường TÁCH RIÊNG (chống Goodhart): Clarity (composite) · Độ sâu · Cấu trúc. Cửa sổ rolling 4 buổi.
        <b>Composite lên mà Độ sâu phẳng = chưa chạm gốc.</b></div>
    </div>`;
  }
  function drawTrend(){
    const t = D.trend || {};
    const labels = (t.dates||[]).map(short);
    const mk = (data,col,label,dash)=>({
      label, data:(data||[]).map(v=>v==null?null:v),
      borderColor:col, backgroundColor:col,
      borderWidth:2, tension:.3, pointRadius:2, spanGaps:true,
      borderDash:dash||[]
    });
    chart('cTrend', {
      type:'line',
      data:{ labels, datasets:[
        mk(t.clarity_roll,   COL.accent2, 'Clarity (composite)'),
        mk(t.depth_roll,     COL.accent,  'Độ sâu', [6,4]),
        mk(t.structure_roll, COL.orange,  'Cấu trúc', [2,3]),
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{ labels:{ color:COL.mut, usePointStyle:true, boxWidth:8, font:{size:11} } },
          tooltip:{ callbacks:{ label:c=> `${c.dataset.label}: ${c.raw==null?'—':(Math.round(c.raw*100)/100)}` } } },
        scales:{
          x:{ grid:{ color:COL.line }, ticks:{ color:COL.dim, font:{size:10}, maxRotation:0 } },
          y:{ min:0, max:5, grid:{ color:COL.line }, ticks:{ color:COL.dim, stepSize:1, font:{size:10} } }
        }
      }
    });
  }

  // ===================================================================
  // BOOT — dựng chrome rồi vẽ chart (an toàn 0–1 buổi)
  // ===================================================================
  app.innerHTML =
      heroHTML()
    + filterHTML()
    + calHTML()
    + `<div class="grid grid-2">${radarHTML()}${trendHTML()}</div>`
    + sessHTML()
    + `<div class="foot">Articulation Coach · local-only · <b>KHÔNG deploy</b> · data: điểm/metric/adherence (KHÔNG transcript)
        <br>generated <b class="mono">${esc(meta.generated_at||'')}</b></div>`;

  // filter client-side: số tổng theo range (luôn chạy) + wire tab clicks
  renderRangeStats();
  wireFilter();

  // chart cần DOM đã có canvas + Chart.js đã load
  if(window.Chart){ drawRangeCharts(); drawRadar(); drawTrend(); }
  else{ console.warn('Chart.js chưa load — chart bỏ qua, chrome vẫn hiển thị.'); }
})();
</script>
</body>
</html>
