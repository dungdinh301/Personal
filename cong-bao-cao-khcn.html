<script id="rbicTourJs">
(function(){
  var KEY='rbic_tour_v1';
  var CSS=''
  +'#rbicTourHl{position:fixed;z-index:99998;border-radius:10px;pointer-events:none;'
  +'box-shadow:0 0 0 200vmax rgba(8,18,32,.74);transition:all .28s ease;border:2px solid #c79a3a}'
  +'#rbicTourHl.full{box-shadow:none;background:rgba(8,18,32,.74);border:0;border-radius:0;left:0;top:0;right:0;bottom:0;width:auto;height:auto;transition:none}'
  +'#rbicTourTip{position:fixed;z-index:99999;max-width:330px;background:#fff;color:#16273f;'
  +'border-radius:12px;box-shadow:0 18px 50px -12px rgba(8,18,32,.5);padding:16px 18px 13px;'
  +'font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;transition:all .28s ease}'
  +'#rbicTourTip::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:#c79a3a;border-radius:12px 0 0 12px}'
  +'#rbicTourTip h4{margin:0 0 6px;font-size:15px;font-weight:750;letter-spacing:-.01em;line-height:1.35}'
  +'#rbicTourTip p{margin:0 0 13px;font-size:13px;line-height:1.5;color:#4a586c}'
  +'#rbicTourTip .ft{display:flex;align-items:center;gap:10px}'
  +'#rbicTourTip .n{font-size:11.5px;font-weight:700;color:#8892a2;letter-spacing:.04em}'
  +'#rbicTourTip button{font:inherit;font-size:12.5px;font-weight:650;border-radius:8px;cursor:pointer;padding:7px 13px;border:0}'
  +'#rbicTourTip .skip{background:transparent;color:#8892a2;margin-left:auto}'
  +'#rbicTourTip .skip:hover{color:#16273f}'
  +'#rbicTourTip .next{background:#123a63;color:#fff}'
  +'#rbicTourTip .next:hover{background:#0d2c4c}'
  +'#rbicTourBtn{position:fixed;right:18px;bottom:18px;z-index:99997;width:40px;height:40px;border-radius:50%;'
  +'border:0;cursor:pointer;background:#123a63;color:#fff;font-size:17px;font-weight:800;'
  +'box-shadow:0 6px 18px -6px rgba(8,18,32,.5);font-family:inherit}'
  +'#rbicTourBtn:hover{background:#0d2c4c}'
  +'@media(prefers-reduced-motion:reduce){#rbicTourHl,#rbicTourTip{transition:none!important}}';
  var STEPS=[
    {sel:null,t:'Chào mừng bạn đến với hệ thống báo cáo Khối KHCN - Phòng KH & QLHQKD',d:'Hướng dẫn sử dụng — 30 giây làm quen các tính năng chính. Bấm “Tiếp theo” để bắt đầu.'},
    {sel:'#q',t:'Tìm nhanh',d:'Gõ tên báo cáo hoặc công cụ bất kỳ — kết quả lọc tức thì trên toàn bộ 85 mục. Phím tắt: “/”.'},
    {sel:'.rail-nav',t:'Danh mục bên trái',d:'Bấm một nhóm để nhảy thẳng tới nhóm đó. Khi cuộn trang, nhóm đang xem tự sáng để bạn biết mình ở đâu.'},
    {sel:'.audwrap',t:'Bộ lọc đối tượng',d:'Lọc báo cáo theo đối tượng sử dụng: Ban điều hành, BLĐ Vùng, Trưởng đơn vị, CBQL…'},
    {sel:'button[title="Dạng lưới"]',parent:true,t:'Kiểu hiển thị',d:'Chuyển giữa dạng lưới (thẻ) và dạng danh sách tuỳ thói quen xem.'},
    {sel:'.card',t:'Ghim mục hay dùng',d:'Rê chuột vào một thẻ rồi bấm ngôi sao để ghim — mục đã ghim luôn nổi lên đầu ở khu “Đã ghim”.'},
    {sel:null,t:'Sẵn sàng!',d:'Bạn có thể xem lại hướng dẫn này bất cứ lúc nào bằng nút “?” ở góc dưới bên phải.'}
  ];
  var hl,tip,idx=-1,active=false;
  function el(tag,id,html){var e=document.createElement(tag);if(id)e.id=id;if(html)e.innerHTML=html;document.body.appendChild(e);return e;}
  function ensureCss(){if(!document.getElementById('rbicTourCss')){var s=document.createElement('style');s.id='rbicTourCss';s.textContent=CSS;document.head.appendChild(s);}}
  function target(s){
    if(!s.sel)return null;
    var e=document.querySelector(s.sel);
    if(e&&s.parent)e=e.parentElement;
    return e;
  }
  function place(){
    if(!active)return;
    var s=STEPS[idx],e=target(s);
    if(s.sel&&!e){next();return;}
    if(!e){
      hl.className='full';hl.style.cssText='';
      tip.style.left='50%';tip.style.top='50%';tip.style.transform='translate(-50%,-50%)';
    }else{
      hl.className='';
      var r=e.getBoundingClientRect(),p=6;
      hl.style.left=(r.left-p)+'px';hl.style.top=(r.top-p)+'px';
      hl.style.width=(r.width+2*p)+'px';hl.style.height=(r.height+2*p)+'px';
      tip.style.transform='';
      var tw=Math.min(330,innerWidth-24),th=tip.offsetHeight||150;
      var x=Math.max(12,Math.min(r.left,innerWidth-tw-12));
      var y=r.bottom+14+th<innerHeight? r.bottom+14 : Math.max(12,r.top-th-14);
      tip.style.left=x+'px';tip.style.top=y+'px';
    }
    tip.querySelector('h4').textContent=s.t;
    tip.querySelector('p').textContent=s.d;
    tip.querySelector('.n').textContent=(idx+1)+'/'+STEPS.length;
    tip.querySelector('.next').textContent=(idx===STEPS.length-1)?'Hoàn tất':'Tiếp theo →';
  }
  function show(i){
    idx=i;var s=STEPS[idx],e=target(s);
    if(e){try{e.scrollIntoView({behavior:'smooth',block:'center'});}catch(_){e.scrollIntoView();}}
    setTimeout(place, e?420:60);
  }
  function next(){ if(idx>=STEPS.length-1){end();return;} show(idx+1); }
  function end(){
    active=false;
    if(hl)hl.remove();if(tip)tip.remove();hl=tip=null;
    try{localStorage.setItem(KEY,'1');}catch(_){}
    document.removeEventListener('keydown',onKey);
    removeEventListener('resize',place);
  }
  function onKey(ev){ if(ev.key==='Escape')end(); if(ev.key==='ArrowRight'||ev.key==='Enter')next(); }
  function start(){
    if(active)return;active=true;
    ensureCss();
    hl=el('div','rbicTourHl');
    tip=el('div','rbicTourTip','<h4></h4><p></p><div class="ft"><span class="n"></span><button class="skip">Bỏ qua</button><button class="next">Tiếp theo →</button></div>');
    tip.querySelector('.skip').onclick=function(){end();};
    tip.querySelector('.next').onclick=next;
    document.addEventListener('keydown',onKey);
    addEventListener('resize',place,{passive:true});
    show(0);
  }
  function ready(cb){
    var n=0,t=setInterval(function(){
      if(document.querySelector('.rail-nav')&&document.querySelector('#q')&&document.querySelector('.card')){clearInterval(t);cb();}
      else if(++n>150)clearInterval(t);
    },100);
  }
  ready(function(){
    ensureCss();
    if(!document.getElementById('rbicTourBtn')){
      var b=el('button','rbicTourBtn');b.textContent='?';b.title='Xem hướng dẫn sử dụng';
      b.onclick=function(){if(!active)start();};
    }
    var seen=false;try{seen=!!localStorage.getItem(KEY);}catch(_){}
    if(!seen)setTimeout(start,700);
  });
})();
</script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>
